<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MON CINÉ</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css" />
    
</head>
<body>

    <header class="cinema-header">
        <div class="nav-wrapper">
            <div class="logo">
                <a href="index.html">MON<span>CINÉ</span></a>
            </div>

            <nav>
                <ul class="nav-links">
                    <li class="dropdown">
                        <a href="#" id="btn-phim">PHIM</a>
                        <ul class="dropdown-content">
                            <li><a href="#" onclick="changePage('btn-dang-chieu')">Phim Đang Chiếu</a></li>
                            <li><a href="#" onclick="changePage('btn-sap-chieu')">Phim Sắp Chiếu</a></li>
                        </ul>
                    </li>
                    <li><a href="#" id="btn-lich-chieu">LỊCH CHIẾU</a></li>
                    <li><a href="#" id="btn-rap-chieu">RẠP CHIẾU</a></li>
                    <li><a href="#" id="btn-khuyen-mai">KHUYẾN MÃI</a></li>
                    <li><a href="#" id="btn-shop">SHOP</a></li>
                    <li><a href="#" id="btn-danh-gia">ĐÁNH GIÁ PHIM</a></li>
                </ul>
            </nav>

            <div class="nav-right">
                <a href="#" class="btn-tickets">ĐẶT VÉ NGAY</a>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section class="hero">
            <div class="hero-content">
                <p>LIGHT. CAMERA. ACTION.</p>
                <h1>LA VISION</h1>
                <span>Nơi mỗi thước phim là một mảnh ghép của tâm hồn.</span>
            </div>
        </section>
    </main>



<script>
    const mainContent = document.getElementById('main-content');
    const pages = {
        'btn-dang-chieu': `
            <section style="padding: 120px 50px; text-align: center; background: #000;">
                <h2 style="color: #e60012; margin-bottom: 40px; letter-spacing: 2px;">DANH SÁCH PHIM ĐANG CHIẾU</h2>
                <div style="display: flex; justify-content: center; gap: 40px; max-width: 1200px; margin: 0 auto;">
                    <div class="movie-card" style="width: 280px;">
                        <img src="jjk0.jpg" style="width: 100%; height: 380px; object-fit: cover; border-radius: 10px; border: 1px solid #333;">
                        <h3 style="font-size: 16px; margin-top: 10px; color: #fff;">JUJUTSU KAISEN 0</h3>
                        <p style="color: #888; font-size: 13px;">Thể loại: Hành động, Kỳ ảo</p>
                        <p style="color: #888; font-size: 13px;">Thời lượng: 105 phút</p>
                    </div>
                </div>
            </section>`,

        'btn-sap-chieu': `
            <section style="padding: 120px 50px; text-align: center; background: #000;">
                <h2 style="color: #e60012; margin-bottom: 40px; letter-spacing: 2px;">DANH SÁCH PHIM SẮP CHIẾU</h2>
                <div style="display: flex; justify-content: center; gap: 40px; max-width: 1200px; margin: 0 auto;">
                    <div class="movie-card" style="width: 280px;">
                        <img src="yourname.jpg" style="width: 100%; height: 380px; object-fit: cover; border-radius: 10px; border: 1px solid #333;">
                        <h3 style="font-size: 16px; margin-top: 10px; color: #fff;">YOUR NAME</h3>
                        <p style="color: #888; font-size: 13px;">Thể loại: Lãng mạn, Học đường</p>
                        <p style="color: #888; font-size: 13px;">Thời lượng: 110 phút</p>
                    </div>
                </div>
            </section>`,
        
        'btn-lich-chieu': `
            <section style="padding: 120px 50px; text-align: center;">
                <h2 style="color: #e60012;">LỊCH CHIẾU HÔM NAY</h2>
                <p style="margin-top: 20px; color: #888;">Hệ thống đang cập nhật lịch chiếu từ các rạp...</p>
                <table style="width: 100%; max-width: 800px; margin: 40px auto; border-collapse: collapse;">
                    <tr style="border-bottom: 1px solid #333;">
                        <td style="padding: 20px;">14:00</td>
                        <td style="padding: 20px; color: #e60012;">JUJUTSU KAISEN 0</td>
                        <td style="padding: 20px;">Phòng chiếu 04</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #333;">
                        <td style="padding: 20px;">16:30</td>
                        <td style="padding: 20px; color: #e60012;">YOUR NAME</td>
                        <td style="padding: 20px;">Phòng chiếu 01</td>
                    </tr>
                </table>
            </section>`,

        'btn-rap-chieu': `
            <section style="padding: 120px 50px; text-align: center;">
                <h2 style="color: #e60012;">HỆ THỐNG RẠP</h2>
                <p style="margin-top: 20px;">Tìm kiếm rạp MON CINÉ gần bạn nhất.</p>
            </section>`,

        'btn-khuyen-mai': `
            <section style="padding: 120px 50px; text-align: center;">
                <h2 style="color: #e60012;">ƯU ĐÃI & KHUYẾN MÃI</h2>
                <div style="margin-top: 30px; padding: 40px; border: 2px dashed #e60012; display: inline-block;">
                    <h3 style="color: #fff;">GIẢM 50% CHO HỌC SINH/SINH VIÊN</h3>
                    <p style="color: #888; margin-top: 10px;">Áp dụng cho tất cả các suất chiếu thứ 4 hàng tuần.</p>
                </div>
            </section>`,

        'btn-shop': `
            <section style="padding: 120px 50px; text-align: center;">
                <h2 style="color: #e60012;">CINÉ SHOP</h2>
                <p style="margin-top: 20px;">Mua bắp nước và quà lưu niệm anime chính hãng.</p>
            </section>`,

        'btn-danh-gia': `
            <section style="padding: 120px 50px; text-align: center;">
                <h2 style="color: #e60012;">ĐÁNH GIÁ PHIM</h2>
                <p style="margin-top: 20px;">Chia sẻ cảm nhận của bạn về những bộ phim đã xem.</p>
            </section>`
    };

    function changePage(pageId) {
        if (!pages[pageId]) return;
        mainContent.style.opacity = 0;
        setTimeout(() => {
            mainContent.innerHTML = pages[pageId];
            mainContent.style.opacity = 1;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }, 300);
    }
    Object.keys(pages).forEach(id => {
        const btn = document.getElementById(id);
        if (btn) {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                changePage(id);
            });
        }
    });
    const logo = document.querySelector('.logo a');
    const originalHero = mainContent.innerHTML;
    logo.addEventListener('click', (e) => {
        e.preventDefault();
        mainContent.style.opacity = 0;
        setTimeout(() => {
            mainContent.innerHTML = originalHero;
            mainContent.style.opacity = 1;
        }, 300);
    });
</script>


</body>
</html>
